<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mausam Ka Haal</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container mt-5">
    <div class="card weather-card shadow p-4">

      <h1 class="text-center mb-4"> Mausam Ka Haal</h1>

      <div class="input-group mb-3">
        <input
          type="text"
          id="cityInput"
          class="form-control"
          placeholder="Enter City Name"
        >
        <button class="btn btn-primary" id="searchBtn">
          Search
        </button>
      </div>

      <div id="weatherResult" class="d-none">

        <h2 id="city" class="text-center"></h2>

        <div class="text-center">
          <img id="icon" alt="">
        </div>

        <h3 id="temp" class="text-center"></h3>

        <p id="description"></p>

        <p id="humidity"></p>

        <p id="wind"></p>

      </div>

    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
