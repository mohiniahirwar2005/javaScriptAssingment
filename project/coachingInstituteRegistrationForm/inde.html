<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container my-5">
      <h2 class="text-center mb-4">Coaching Institute Registration Form</h2>

      <form id="registrationForm" novalidate>
        <div class="form">
          <h4 class="title">Personal Information</h4>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" id="fullName" />
              <div class="error" id="fullNameError"></div>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Email Address</label>
              <input type="email" class="form-control" id="email" />
              <div class="error" id="emailError"></div>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Mobile Number</label>
              <input
                type="number"
                class="form-control"
                id="mobile"
                maxlength="10"
              />
              <div class="error" id="mobileError"></div>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Date of Birth</label>
              <input type="date" class="form-control" id="dob" />
              <div class="error" id="dobError"></div>
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Gender</label><br />
              <div class="form-check form-check-inline">
                <input
                  class="form-check-input"
                  type="radio"
                  name="gender"
                  id="male"
                  value="Male"
                />
                <label class="form-check-label" for="male">Male</label>
              </div>
              <div class="form-check form-check-inline">
                <input
                  class="form-check-input"
                  type="radio"
                  name="gender"
                  id="female"
                  value="Female"
                />
                <label class="form-check-label" for="female">Female</label>
              </div>
              <div class="form-check form-check-inline">
                <input
                  class="form-check-input"
                  type="radio"
                  name="gender"
                  id="other"
                  value="Other"
                />
                <label class="form-check-label" for="other">Other</label>
              </div>
              <div class="error" id="genderError"></div>
            </div>
          </div>
        </div>

        <div class="form">
          <h4 class="title">Academic Details</h4>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Last Completed Qualification</label>
              <select class="form-select" id="qualification">
                <option value="">Select Qualification</option>
                <option value="10th">10th</option>
                <option value="12th">12th</option>
                <option value="Graduate">Graduate</option>
                <option value="Postgraduate">Postgraduate</option>
              </select>
              <div class="error" id="qualificationError"></div>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Percentage/Grade</label>
              <input
                type="text"
                class="form-control"
                id="percentage"
                placeholder="85 or A"
              />
              <div class="error" id="percentageError"></div>
            </div>
          </div>
        </div>

        <div class="form">
          <h4 class="title">Course Information</h4>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Preferred Course</label>
              <select class="form-select" id="course">
                <option value="">Select Course</option>
                <option value="IIT_JEE">IIT_JEE</option>
                <option value="NEET">NEET</option>
                <option value="Banking Exams,">Banking Exams</option>
                <option value="UPSC">UPSC</option>
              </select>
              <div class="error" id="courseError"></div>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Batch Timing Preference</label>
              <select class="form-select" id="batch">
                <option value="">Select Batch</option>
                <option value="Morning">Morning</option>
                <option value="Afternoon">Afternoon</option>
                <option value="Evening">Evening</option>
                <option value="Weekend">Weekend</option>
              </select>
              <div class="error" id="batchError"></div>
            </div>
          </div>
        </div>

        <div class="form">
          <h4 class="title">Address</h4>
          <div class="row">
            <div class="col-12 mb-3">
              <label class="form-label">Residential Address</label>
              <textarea class="form-control" id="address" rows="2"></textarea>
              <div class="error" id="addressError"></div>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">City</label>
              <input type="text" class="form-control" id="city" />
              <div class="error" id="cityError"></div>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Pin Code</label>
              <input
                type="text"
                class="form-control"
                id="pincode"
                maxlength="6"
              />
              <div class="error" id="pincodeError"></div>
            </div>
          </div>
        </div>

        <div class="form">
          <h4 class="title">Guardian Details</h4>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Guardians Full Name</label>
              <input type="text" class="form-control" id="guardianName" />
              <div class="error" id="guardianNameError"></div>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Guardians Contact Number</label>
              <input
                type="text"
                class="form-control"
                id="guardianContact"
                maxlength="10"
              />
              <div class="error" id="guardianContactError"></div>
            </div>
          </div>
        </div>

        <div class="form">
          <h4 class="title">Additional Information</h4>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">How did you hear about us? *</label>
              <select class="form-select" id="source">
                <option value="">Select Option</option>
                <option value="Friends">Friends</option>
                <option value="Online Ad">Online Ad</option>
                <option value="Newspaper">Newspaper</option>
                <option value="Social Media">Social Media</option>
                <option value="Other">Other</option>
              </select>
              <div class="error" id="sourceError"></div>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Special Requirements</label>
              <textarea class="form-control" id="special" rows="2"></textarea>
            </div>
          </div>
        </div>

        <div class="text-center">
          <button type="submit" class="btn btn-primary btn-lg px-5">
            Submit Registration
          </button>
        </div>
      </form>

      <div id="Msg" class="alert alert-success mt-4 text-center">
        <h4>Registration Successful!</h4>
        <p>Thank you for registering. We will contact you soon.</p>
      </div>
    </div>

    <!-- Scripts -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
