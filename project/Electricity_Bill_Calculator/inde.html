<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Electricity Bill Calculator</title>

  
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container py-5">

    <div class="row justify-content-center">
      <div class="col-lg-6 col-md-8">

        <div class="calculator-card">

          <h1 class="text-center mb-4">
             Electricity Bill Calculator
          </h1>

          
          <div class="mb-3">
            <label class="form-label">Enter Electricity Units</label>

            <input
              type="number"
              id="units"
              class="form-control"
              placeholder="Enter units"
              min="0"
            />
          </div>

          
          <div class="d-flex gap-3 mb-4">

            <button class="btn btn-primary w-50" onclick="calculateBill()">
              Calculate
            </button>

            <button class="btn btn-danger w-50" onclick="resetBill()">
              Reset
            </button>

          </div>

          
          <div class="card shadow-sm d-none" id="resultCard">

            <div class="card-body">

              <h3 class="card-title mb-3">
                Bill Details
              </h3>

              <div id="billDetails"></div>

            </div>

          </div>

        </div>

      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
