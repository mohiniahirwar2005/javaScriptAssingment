<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Travel Bill Calculator</title>

  
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container py-5">

    <div class="row justify-content-center">

      <div class="col-lg-6 col-md-8">

        <div class="calculator-box">

          <h1 class="text-center mb-4">
             Travel Bill Calculator
          </h1>

          <!-- Input -->
          <div class="mb-3">

            <label class="form-label">
              Enter Kilometers Covered
            </label>

            <input
              type="number"
              id="kmInput"
              class="form-control"
              placeholder="Enter kilometers"
              step="0.1"
            />

            <small class="text-danger" id="errorMsg"></small>

          </div>

          
          <button class="btn btn-primary w-100" onclick="calculateBill()">
            Calculate Bill
          </button>

          
          <div class="card mt-4 d-none" id="resultCard">

            <div class="card-body">

              <h3 class="mb-3">
                Bill Details
              </h3>

              <div id="breakdown"></div>

              <hr>

              <h2 class="text-success text-center">
                Total Bill = ₹<span id="totalBill">0</span>
              </h2>

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
