<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tip Calculator</title>

  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>

  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>

  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="tip-card">

    <h1><i class="bi bi-cash-coin"></i> Tip Calculator</h1>
    <p>Calculate tip and split the bill easily</p>

    
    <div class="mb-3">
      <label class="form-label">Bill Amount</label>
      <input 
        type="number" 
        id="billAmount" 
        class="form-control" 
        placeholder="Enter bill amount"
      >
    </div>

    
    <div class="mb-3">
      <label class="form-label">How was the service?</label>

      <select id="service" class="form-select">
        <option value="0.25">25% - Top Notch</option>
        <option value="0.20">20% - Excellent</option>
        <option value="0.15">15% - Good</option>
        <option value="0.10">10% - Bad</option>
        <option value="0.05">5% - Worst</option>
      </select>
    </div>

    
    <div class="mb-3">
      <label class="form-label">Number of People</label>
      <input 
        type="number" 
        id="people" 
        class="form-control" 
        placeholder="Enter total people"
      >
    </div>

   
    <button class="btn-calculate" onclick="calculateTip()">
      Calculate
    </button>

    <div class="result-box" id="resultBox">
      <h3>Each Person Should Pay</h3>
      <div class="amount" id="finalAmount">₹0.00</div>
    </div>

  </div>

   <script src="script.js"></script>

</body>
</html>
