<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Converter</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div
      class="container d-flex justify-content-center align-items-center min-vh-100"
    >
      <div class="converter-box">
        <h1 class="text-center title">Currency Converter</h1>

        <label class="fw-bold mb-2"> Enter Amount </label>

        <input
          type="number"
          id="amount"
          class="form-control mb-4"
          placeholder="Enter amount"
        />

        <div class="row align-items-center">
          <div class="col-md-5 text-center">
            <img
              id="country1Flag"
              src="https://flagsapi.com/US/flat/64.png"
              class="flag"
            />

            <label class="fw-bold d-block mb-2"> From </label>

            <select id="country1" class="form-select" onchange="FetchFlag1()">
              <option value="">Select Country</option>
            </select>
          </div>

          <div class="col-md-2 text-center">
            <button class="swap-btn" onclick="swapCountries()">
              <i class="bi bi-arrow-left-right"></i>
            </button>
          </div>

          <div class="col-md-5 text-center">
            <img
              id="country2Flag"
              src="https://flagsapi.com/IN/flat/64.png"
              class="flag"
            />

            <label class="fw-bold d-block mb-2"> To </label>

            <select id="country2" class="form-select" onchange="FetchFlag2()">
              <option value="">Select Country</option>
            </select>
          </div>
        </div>

        <button class="btn btn-primary w-100 mt-4" onclick="ConvertCurrency()">
          Convert
        </button>

        <div class="result-box mt-4">
          <h2 id="result">0.00</h2>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
