<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Salary Calculator</title>

  
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container py-5">

    <div class="row justify-content-center">

      <div class="col-lg-6 col-md-8">

        <div class="salary-box">

          <h1 class="text-center mb-4">
             Salary Calculator
          </h1>

          
          <div class="mb-3">

            <label class="form-label">
              Enter Basic Salary
            </label>

            <input
              type="number"
              id="basicSalary"
              class="form-control"
              placeholder="Enter basic salary"
            />

            <small class="text-danger" id="errorMsg"></small>

          </div>

         
          <div class="d-flex gap-3">

            <button
              class="btn btn-primary w-100"
              id="calculateBtn"
              onclick="handleCalculation()"
            >
              Calculate Gross Salary
            </button>

            <button
              class="btn btn-danger w-100"
              onclick="resetForm()"
            >
              Reset
            </button>

          </div>

          
          <div
            class="alert alert-success mt-3 d-none"
            id="successMsg"
          >
            Salary calculated successfully!
          </div>

          
          <div class="card mt-4 d-none" id="resultCard">

            <div class="card-body">

              <h3 class="mb-3">
                Salary Details
              </h3>

              <div class="salary-row">
                <span>Basic Salary</span>
                <span id="basicResult"></span>
              </div>

              <div class="salary-row">
                <span>HRA</span>
                <span id="hraResult"></span>
              </div>

              <div class="salary-row">
                <span>DA</span>
                <span id="daResult"></span>
              </div>

              <hr>

              <div class="salary-row total">
                <span>Gross Salary</span>
                <span id="grossResult"></span>
              </div>

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
