<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
<div class="container mt-5">
  <div class="d-flex gap-3 mb-3 d-lg-flex flex-column">
    <input type="text" id="fullName" placeholder="Enter Name" class="form-control" />
    <input type="text" id="city" placeholder="Enter City" class="form-control" />
    <input type="email" id="email" placeholder="Enter Email" class="form-control" />
    <input type="password" id="password" placeholder="Enter Password" class="form-control" />
  </div>

  <button class="btn btn-primary" onclick="handleSubmit()">Submit</button>
</div>

<hr />

<div class="border rounded shadow container p-4 divHide" id="dataCard">
  <p><b>Name:</b> <span id="myName"></span></p>
  <p><b>City:</b> <span id="myCity"></span></p>
  <p><b>Email:</b> <span id="myEmail"></span></p>
  <p><b>Password:</b> <span id="myPassword"></span></p>
</div>


    <script src="script.js"></script>
</body>
</html>
